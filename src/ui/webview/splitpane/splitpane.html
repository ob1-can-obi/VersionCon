<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="%%CSP%%">
  <link href="%%CSS_URI%%" rel="stylesheet">
  <title>VersionCon: Workspace</title>
</head>
<body>
  <div class="split-container">
    <div class="pane pane-left" id="workspace-pane">
      <div class="pane-header">
        <span class="pane-title">Workspace</span>
        <span class="pane-badge" id="staged-count"></span>
      </div>
      <div class="pane-content" id="workspace-content" draggable="true">
        <vscode-tree id="workspace-tree"></vscode-tree>
      </div>
    </div>
    <div class="pane-divider"></div>
    <div class="pane pane-right" id="branch-pane">
      <div class="pane-header">
        <span class="pane-title">Branch</span>
        <span class="pane-badge read-only">read-only</span>
      </div>
      <div class="pane-content" id="branch-content" draggable="true">
        <vscode-tree id="branch-tree"></vscode-tree>
      </div>
    </div>
  </div>
  <script nonce="%%NONCE%%" src="%%ELEMENTS_URI%%"></script>
  <script nonce="%%NONCE%%" src="%%JS_URI%%"></script>
</body>
</html>
